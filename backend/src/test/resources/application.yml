spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoint:
    health:
      show-details: always

app:
  security:
    user:
      name: test-user
      password: test-password
  auth:
    post-signup-redirect-uri: http://localhost:5173/
    signup-screen-uri: http://localhost:5173/signup
    token-encryption-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
