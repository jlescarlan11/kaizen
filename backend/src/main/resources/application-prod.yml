spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

management:
  endpoint:
    health:
      # In prod, never reveal component-level health detail to anonymous
      # (or even authenticated) callers — the summary status is enough.
      show-details: never

sentry:
  enabled: true

app:
  security:
    user:
      name: ${APP_SECURITY_USER}
      password: ${APP_SECURITY_PASSWORD}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
