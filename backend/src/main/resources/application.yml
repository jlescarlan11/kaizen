spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:kaizen}
    username: ${DB_USER:kaizen}
    password: ${DB_PASSWORD:kaizen}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}

management:
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

app:
  security:
    user:
      name: ${APP_SECURITY_USER}
      password: ${APP_SECURITY_PASSWORD}
  auth:
    post-signup-redirect-uri: ${APP_AUTH_POST_SIGNUP_REDIRECT_URI:http://localhost:5173/}
    signup-screen-uri: ${APP_AUTH_SIGNUP_SCREEN_URI:http://localhost:5173/signup}
    token-encryption-key-base64: ${APP_AUTH_TOKEN_ENCRYPTION_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:google-client-id}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:google-client-secret}
      redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
