spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:kaizen}
    username: ${DB_USER:kaizen}
    password: ${DB_PASSWORD:kaizen}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  security:
    user:
      name: dev-user
      password: dev-password
