<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaizen</title>
    <script>
      ;(function () {
        const validThemes = ['light', 'dark', 'system']
        let theme = 'system'

        try {
          const storedTheme = localStorage.getItem('kaizen-theme')

          if (storedTheme && validThemes.includes(storedTheme)) {
            theme = storedTheme
          } else if (storedTheme) {
            localStorage.setItem('kaizen-theme', 'system')
          }
        } catch {
          theme = 'system'
        }

        const resolvedTheme =
          theme === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : theme
        document.documentElement.classList.add(resolvedTheme)
        document.documentElement.setAttribute('data-theme', resolvedTheme)
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
